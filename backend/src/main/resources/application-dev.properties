spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/streamappdb
spring.datasource.username=streamapp
spring.datasource.password=streamapp

spring.flyway.default-schema=streamapp
spring.jooq.sql-dialect=postgres

spring.cloud.aws.endpoint=http://localhost:4566
spring.cloud.aws.region.static=us-east-1

spring.cloud.aws.s3.path-style-access-enabled=true

# Mark AWAITING_UPLOAD rows as FAILED when the client never completes the S3 PUT
streamapp.upload.awaiting-upload-ttl=30m
streamapp.upload.cleanup-interval=5m
streamapp.upload.cleanup.enabled=true
